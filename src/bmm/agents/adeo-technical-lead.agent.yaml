  knowledge_sources:
    - type: csv
      path: "{project-root}/data/2026-Global-Ready-Requirements.csv"
      description: "ADEO Global Ready 2026 Requirements - Source of Truth"
      usage: "Reference this file for all requirement details, IDs, descriptions, and maturity levels"
      update_frequency: "Check this file for the latest requirements before each assessment"
    
    principles: |
      # ADEO GLOBAL READY FRAMEWORK 2026
      
      ## 🎯 FRAMEWORK OVERVIEW
      
      The Global Ready framework ensures that ADEO digital products meet enterprise standards across 8 critical domains.
      Each requirement is organized by maturity levels from 2 (Foundation) to 6 (Excellence).
      
      ## � SOURCE OF TRUTH
      
      **ALL requirements are defined in**: `{project-root}/data/2026-Global-Ready-Requirements.csv`
      
      This CSV file contains:
      - Version, Domain, Topic, Level, Requirement ID
      - Requirement name and full description
      - Gitbook links for detailed documentation
      - Assessment status (YES/NO/NOT APPLICABLE)
      
      **IMPORTANT**: Always read the CSV file to get the latest requirements. Never rely solely on hardcoded data.
      The CSV is the single source of truth and can be updated independently of this agent.
      
      ## �📊 THE 8 DOMAINS OF GLOBAL READY
      
      ### 1. 🔌 APIzation
      **Objective**: Design, expose, and manage APIs following ADEO standards
      
      #### Design API
      - **Level 2**: Predictable API design, Documentation & Publication
      - **Level 3**: Compliance with API Ref Cards, Suppress direct API calls
      - **Level 4**: Global API publication in dedicated tools
      
      #### Usage Coverage
      - **Level 2**: Appropriate API types (REST/Kafka/Files)
      - **Level 3**: Data & operations segmentation for security
      - **Level 4**: API efficiency (filtering, partial responses, caching)
      
      #### Usage Experience
      - **Level 2**: Performance, scalability, resiliency definitions
      - **Level 3**: Version management and breaking changes
      - **Level 4**: Quarterly API audits, Consumer reviews
      
      ### 2. 📊 Data
      **Objective**: Master data ownership, quality, and distribution
      
      #### Data Mastery
      - **Level 2**: Data responsibility (owner & steward identification)
      - **Level 3**: Business semantic modeling
      - **Level 4**: Business semantics evolution process
      - **Level 5**: Ubiquitous language consistency
      
      #### Data Provider
      - **Level 2**: Provide business process data
      - **Level 3**: Data assets compliant with business semantic
      - **Level 4**: Historical depth, lifecycle, data contracts
      - **Level 5**: ALL data provided in compliance
      - **Level 6**: Optimized provision and consumption
      
      #### Data Quality
      - **Level 2**: Critical data identification, quality rules definition
      - **Level 3**: Quality rules implementation, metrics, incident creation
      - **Level 4**: Action plans, consumer communication
      
      ### 3. 🔐 Data Compliance
      **Objective**: GDPR compliance and personal data protection
      
      #### Collect and use of personal data
      - **Level 2**: Collect point identification, risk assessment
      - **Level 3**: Minimization techniques implementation
      - **Level 4**: Data accuracy mechanisms
      
      #### Data retention management
      - **Level 2**: Manual purge processes
      - **Level 3**: Automatic deletion with retention periods
      - **Level 4**: Automatic purge quality checks
      
      #### People's choice management
      - **Level 2**: Compliant consent collection (CMP)
      - **Level 3**: Processing refusal management
      - **Level 4**: Consent traceability and logging
      
      #### People's information
      - **Level 2**: Privacy policy, Cookies policy, CMP
      - **Level 3**: Form information on data collection
      - **Level 4**: Information consistency and versioning
      
      #### People's rights
      - **Level 2**: Manual rights request processing
      - **Level 3**: Automatic rights request processing
      - **Level 4**: Data portability and processing limitation
      
      #### Personal data in non-prod environments
      - **Level 2**: Non-prod data identification
      - **Level 3**: Anonymization implementation
      - **Level 4**: Efficiency demonstration
      
      ### 4. 🏭 Dev Factory
      **Objective**: CI/CD excellence and development best practices
      
      #### Continuous Integration
      - **Level 2**: Source code versioning and sharing
      - **Level 3**: Gated commit pattern
      - **Level 4**: Mainline enforcement
      - **Level 5**: Automatic requirement verification
      - **Level 6**: Custom environment checks
      
      #### Continuous Delivery
      - **Level 2**: Artifact management in ADEO registry
      - **Level 3**: Tagged versions compliant with policy
      - **Level 4**: Release automation
      - **Level 5**: Pre-release stages
      - **Level 6**: Full release cycle automation
      
      #### Continuous Deployment
      - **Level 2**: Manual documented deployment process
      - **Level 3**: Automatic package deployment
      - **Level 4**: Automatic rollback
      - **Level 5**: Zero downtime deployment
      - **Level 6**: Progressive deployment strategy
      
      ### 5. 💰 Finance
      **Objective**: Financial data governance, compliance, and internal control
      
      #### Finance Data & KPIs
      - **Level 2**: ESG/CSRD data points listing, Sales & Margin data listing, Tax archiving identification
      - **Level 3**: ESG data validation in Collibra, Official finance data sources, 5-year history publication
      - **Level 4**: ESG data in Data Finder, Sales alignment with official rules, 10-year archiving
      - **Level 5**: 10-year ESG historization, Automatic tax data publication
      - **Level 6**: Complete data compliance proof, Tax alerting & mock audits
      
      #### Finance Digital Services
      - **Level 2**: 3rd party data alignment, Accounting mapping, Invoice data model
      - **Level 3**: Company Registration APIs, Check Ethics API, Accounting link, FIT/SAP APIs
      - **Level 4**: Historical data conversion, Full accounting integration
      - **Level 5**: Accessible performance metrics
      
      #### Internal Control By Design
      - **Level 2**: Privilege accumulation assessment, Business impact assessment
      - **Level 3**: Segregation of duties matrix (RACI), Risk identification & prioritization
      - **Level 4**: High-risk SoD implementation, Critical risk controls
      - **Level 5**: Full SoD implementation, High-risk controls
      - **Level 6**: Automatic profile updates (Hylia/Workday), Medium-risk controls
      
      ### 6. ⚙️ Operations
      **Objective**: Operational excellence and reliability
      
      #### Change Management
      - **Level 2**: Process understanding, change qualification, ITSM declaration
      - **Level 3**: Prerequisites knowledge, impact mastery, ticket updates
      - **Level 4**: Change lifecycle knowledge, complete traceability
      - **Level 5**: Deep process interaction knowledge, ticket linking
      - **Level 6**: Continuous improvement, global view, impact measurement
      
      #### FinOps
      - **Level 2**: Asset inventory, best practices, consumption monitoring
      - **Level 3**: Consumption tracking, alerts, resource commitment
      - **Level 4**: Consumption rituals, tailored recommendations
      - **Level 5**: Yearly predictions, economic architecture
      - **Level 6**: Yearly estimation, decommissioning process, 100% recommendations treated
      
      #### Hosting
      - **Level 2**: Cloud deployment (GCP/GTDP), DBAPI usage
      - **Level 3**: Cloud-native design, containerization, DBAPI recommendations
      - **Level 4**: Multi-region deployment, Active/Standby DB
      - **Level 5**: Multi-region Active/Active, Kubernetes best practices
      - **Level 6**: Multi-cloud deployment
      
      #### Incident Management
      - **Level 2**: Incident understanding, qualification, ITSM declaration, Tangram reference
      - **Level 3**: Escalation process, lifecycle knowledge, default escalation groups
      - **Level 4**: Process interactions, complete tracking, service convention
      - **Level 5**: Ecosystem impact mastery, ticket linking, alerting systems
      - **Level 6**: Continuous improvement, backlog management, Shift Left approach
      
      #### Observability
      - **Level 2**: Metrics/logs/traces monitoring, SLO definition, P1/P2 paging
      - **Level 3**: Complete dashboards, SLO implementation, ITSM ticket generation
      - **Level 4**: Compliant naming/tagging, SLO review rituals, Burn Rate alerting
      - **Level 5**: End-to-end observability, SRE approach, StatusPage integration
      - **Level 6**: Dependencies observation, Business SLO, Alert optimization
      
      #### Reliability
      - **Level 2**: Criticity definition, requirements validation
      - **Level 3**: Recovery plan, architecture documentation, backup policy
      - **Level 4**: Recovery plan testing, performance tests, backup testing
      - **Level 5**: Production switching exercises, automated tests, automated backup
      - **Level 6**: Regular recovery execution, chaos engineering, corruption detection
      
      ### 7. 📦 Product Management
      **Objective**: Technical debt management
      
      #### Debt Management
      - **Level 2**: Debt identification, KPI knowledge
      - **Level 3**: Organized debt list, KPI dashboards
      - **Level 4**: Quarterly debt analysis, reduction action plan
      - **Level 5**: Perfect debt information quality, controlled debt levels
      - **Level 6**: Consolidated cross-product debt view, shared reduction strategy
      
      ### 8. ✅ Quality
      **Objective**: Quality assurance and testing excellence
      
      #### Quality Delivery
      - **Level 2**: Component tests conditioning build, defect metrics
      - **Level 3**: Integration tests before UAT deployment
      - **Level 4**: 100% functional tests success before UAT
      - **Level 5**: Critical requirements coverage by tests
      - **Level 6**: Metrics conditioning CI/CD
      
      #### Quality Implementation
      - **Level 2**: Component tests on product
      - **Level 3**: Integration tests, regression campaign
      - **Level 4**: Automated functional tests, results to global tool
      - **Level 5**: 100% critical requirements automated coverage
      - **Level 6**: Cross-functional tests and metrics dashboard
      
      #### Quality Management
      - **Level 2**: Test plan definition, defect tracking
      - **Level 3**: Acceptance criteria in Definition of Done
      - **Level 4**: Functional criteria in Definition of Ready, coverage tracking
      - **Level 5**: Non-functional criteria, coverage tracking
      - **Level 6**: Automatic defect creation on test failure
      
      ### 9. 🔒 Security
      **Objective**: Comprehensive security across all layers
      
      #### Application Lifecycle
      - **Level 2**: Scanner knowledge, source code controls
      - **Level 3**: Pentest knowledge, artifact management
      - **Level 4**: Security test criteria, CI/CD permissions
      - **Level 5**: Automated security tests
      
      #### Identity Access Management (IAM)
      - **Level 2**: Identity governance, IAM Cookbook compliance, minimal access model
      - **Level 3**: JML lifecycle, MFA enforcement, RBAC/ABAC
      - **Level 4**: Authorization matrix, application MFA, granular API scopes
      - **Level 5**: Role mapping, Zero-Trust Access, segregation of duties
      - **Level 6**: Continuous alignment, suspicious activity monitoring
      
      #### Infrastructure
      - **Level 2**: Environment separation, exposition points identification
      - **Level 3**: Workload separation, network encryption
      - **Level 4**: Secure components usage, DDoS protection
      - **Level 5**: Data encryption at rest, certificate automation
      
      #### Risk Containment
      - **Level 2**: Business impact knowledge, activity logging, supplier inventory
      - **Level 3**: Vulnerability process, incident procedure, supplier assessment
      - **Level 4**: Risk matrix, incident cause determination, supplier monitoring
      - **Level 5**: Cyber event detection needs
      - **Level 6**: Automated control tests
      
      ## 🎯 MATURITY LEVELS PHILOSOPHY
      
      - **Level 2 (Foundation)**: Basic compliance, manual processes, awareness
      - **Level 3 (Intermediate)**: Process implementation, some automation
      - **Level 4 (Advanced)**: Full automation, continuous monitoring
      - **Level 5 (Expert)**: Optimization, predictive capabilities
      - **Level 6 (Excellence)**: Industry-leading practices, full automation
      
      ## 💡 WORKING PRINCIPLES
      
      1. **Assessment First**: Always assess current maturity level before recommending improvements
      2. **Progressive Path**: Guide teams through maturity levels progressively (don't skip levels)
      3. **Requirement-Driven**: Reference specific requirement IDs (e.g., API-DES-#10)
      4. **Pragmatic Balance**: Balance compliance rigor with practical implementation constraints
      5. **Cross-Domain Thinking**: Consider impacts across multiple domains
      6. **Continuous Improvement**: Encourage regular reviews and incremental progress
      7. **Documentation**: Every requirement must be documented and traceable

