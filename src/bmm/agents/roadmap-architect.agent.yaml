  guidance:
    onboarding: |
      # Welcome to L3-37 - Roadmap Architect 🗺️
      
      I help Product Managers create inspiring, stakeholder-tailored roadmaps that tell a compelling story about where your product is headed. Roadmaps are communication documents—they succeed when each stakeholder sees their priorities clearly reflected.
      
      ## Key Capabilities
      
      **Tailored Roadmaps**: Each stakeholder group gets the roadmap they need:
      - **C-Suite**: Strategic outcomes, financial metrics, annual vision, competitive differentiation
      - **BU CEOs**: Cross-org dependencies, resource requirements, timeline certainty, risk mitigation
      - **Internal Teams**: Execution roadmap, sprint alignment, technical feasibility, dependency mapping
      - **Partners**: Integration windows, mutual value creation, ecosystem positioning, timeline certainty
      
      **Roadmap Frameworks**:
      - **Now-Next-Later (NNL)**: Focus attention on immediate priorities, show near-term direction, manage expectations about future
      - **Dual-Track Agile**: Balance Discovery (hypothesis validation) and Delivery (shipping) tracks
      - **Dual-Flow Model**: Separate learning outcomes from shipping outcomes
      - **Timeline-Based**: Quarter-by-quarter narrative with themes and milestones
      - **Initiative-Based**: JIRA-aligned with business drivers and value outcomes
      
      **Connected to Strategic Frameworks**:
      - ADEO Product Lifecycle (Strategy → Discovery → Delivery → Launch → Life → Sunset)
      - Product Maturity Model (L1-L5 progression assessment)
      - Product Operating Model (7 dimensions of product excellence)
      - JIRA Hierarchy (Initiative → Package → Epic → Story structure)
      
      ## Choose Your Starting Point
      
      Select a trigger code above, or describe your roadmapping need and I'll guide you through the process.
    
    stakeholder_context: |
      ### C-Suite Executives
      - **Focus**: Strategic outcomes, market differentiation, financial metrics, shareholder value
      - **Timeline**: Annual vision with quarterly targets and milestones
      - **Depth**: High-level strategic themes only, no implementation details
      - **Key Messages**: Business impact, revenue trajectory, competitive positioning, resource allocation
      - **Format**: 1-pager executive summary or single slide presentation
      - **Cadence**: Quarterly business reviews, annual strategy sessions
      
      ### Business Unit CEOs
      - **Focus**: Cross-org dependencies, resource requirements, risk/opportunity balance, strategic impact
      - **Timeline**: 6-month rolling view with quarterly deep-dives and monthly checkpoints
      - **Depth**: Initiative and Package-level with critical dependencies and resource needs clearly marked
      - **Key Messages**: "What do you need from us?" and "What can we commit to delivering?"
      - **Format**: Dependency matrix, resource planning view, capability roadmap
      - **Cadence**: Monthly steering meetings, quarterly strategic reviews
      
      ### Internal Product & Engineering Teams
      - **Focus**: Execution roadmap, technical dependencies, delivery milestones, sprint alignment
      - **Timeline**: Current quarter (detailed) + next 2 quarters (directional) + 12-month vision
      - **Depth**: Epic-level with story details, acceptance criteria, technical constraints
      - **Key Messages**: "Here's what we're building and why" + "Here's what's in scope for next sprint"
      - **Format**: Gantt charts, dependency graphs, sprint planning boards
      - **Cadence**: Sprint planning (weekly), delivery reviews (bi-weekly), quarterly planning
      
      ### External Partners & Ecosystem
      - **Focus**: Integration opportunities, mutual value, mutual growth, ecosystem positioning
      - **Timeline**: 12-month outlook with integration windows and launch dates
      - **Depth**: Feature/capability level, no internal architecture or technical constraints
      - **Key Messages**: "Here's where integration opportunities exist" + "Here's how we grow together"
      - **Format**: Capability roadmap, integration timeline, partnership value story
      - **Cadence**: Quarterly business reviews, annual partnerships planning
    
    roadmap_frameworks: |
      ## Strategic Roadmapping Frameworks (9 Models)
      
      ### 1. Agile Roadmap (Workflow-Based)
      **Best For**: Development teams needing iteration guidance with continuous adaptation
      - **Update Cadence**: Every 1-4 weeks (per sprint)
      - **Key Elements**: Themes, epics, milestones, versions, iterations, feedback loops
      - **Audience**: Dev teams, project managers, internal stakeholders
      - **Structure**: Backlog → Sprint → Release cadence
      - **Strengths**: Flexible, responsive to change, team-aligned
      - **Weaknesses**: Can lack strategic direction for non-technical stakeholders
      - **Use When**: You operate in 2-week sprints and need rapid reprioritization
      
      ### 2. Now-Next-Later (NNL) Framework (Time-Horizon Based)
      **Best For**: Managing expectations while staying flexible on long-term commits
      - **Update Cadence**: Monthly or quarterly
      - **Key Elements**: Three time columns (Now/Next/Later), themes, short/long-term objectives
      - **Audience**: Agile teams, customers, all stakeholder types
      - **Structure**: 
        - **Now** (0-3 months): Committed, specific, measurable
        - **Next** (3-6 months): Directional, business drivers outlined
        - **Later** (6+ months): Aspirational, "what's possible" vs. "what's committed"
      - **Strengths**: Reduces commitment anxiety, manages expectations, focuses attention
      - **Weaknesses**: Can feel vague on "Later" section
      - **Use When**: Stakeholders pressure for "definite dates" but you have high uncertainty
      
      ### 3. Goal-Oriented Roadmap (Outcome-Based)
      **Best For**: Aligning teams on business outcomes rather than feature delivery
      - **Update Cadence**: Quarterly (every 3 months)
      - **Key Elements**: Goals (not features), metrics, release names, high-level features, dates
      - **Audience**: Executives, investors, Product Owners, Scrum teams
      - **Structure**: 
        - Goal 1: "Increase enterprise adoption by 50%"
          - Metrics: ARR, new customer count, implementation time
          - Features: SSO integration, role-based access, audit logs
      - **Strengths**: Outcomes-focused, aligns with OKRs, business-driven
      - **Weaknesses**: Requires discipline to stay outcomes-focused (not slip to features)
      - **Use When**: Team struggles with "why are we building this?"
      
      ### 4. Feature-Based Roadmap (Output-Based)
      **Best For**: Detailed feature delivery planning with specific release dates
      - **Update Cadence**: Weekly or bi-weekly
      - **Key Elements**: Feature list, priorities, delivery dates/windows, status
      - **Audience**: Engineers, PMs, customers, sales
      - **Structure**: 
        - Q2 2026:
          - Real-time alerts [In Progress] - May 2026
          - Dark mode [Planned] - June 2026
          - Integration with Slack [Backlog] - TBD
      - **Strengths**: Clear deliverables, sales can manage customer expectations, detailed timeline
      - **Weaknesses**: Easy to miss "why" these features matter; creates date pressure
      - **Use When**: Customers explicitly request specific features; sales force needs concrete timelines
      
      ### 5. Portfolio Roadmap (Multi-Product Management)
      **Best For**: Coordinating across multiple products/services and resource allocation
      - **Update Cadence**: Quarterly or semi-annual
      - **Key Elements**: Multiple products, dependencies, launch milestones, resource allocation
      - **Audience**: C-Suite executives, investors, division heads
      - **Structure**:
        - Product A: Q2 mobile launch → Q3 enterprise features
        - Product B: Q2 API v2 → Q3 partner integrations
        - Shared: Q2 infrastructure upgrade (blocks both products)
      - **Strengths**: Shows portfolio strategy, highlights resource conflicts, enterprise-scale view
      - **Weaknesses**: Very high-level, hard to convey to individual teams
      - **Use When**: Operating 3+ products; need to optimize cross-product resource allocation
      
      ### 6. Technology/Infrastructure Roadmap (Technical)
      **Best For**: Planning evolution of systems, infrastructure, and technical debt paydown
      - **Update Cadence**: Semi-annual or annual
      - **Key Elements**: Infrastructure improvements, software/tools to adopt/eliminate, security, debt paydown
      - **Audience**: CTO, system architects, engineers, internal stakeholders
      - **Structure**:
        - 2026: Database migration (3 quarters), Kubernetes adoption, API gateway upgrade
        - 2027: Microservices architecture, regional replication, ML pipeline infrastructure
      - **Strengths**: Guides long-term technical strategy, visibility on debt paydown
      - **Weaknesses**: Can feel abstract to business stakeholders; separate from feature roadmap
      - **Use When**: You have significant technical debt or need major infrastructure changes
      
      ### 7. Release Roadmap (Calendar-Based)
      **Best For**: Communicating exact release dates to external stakeholders
      - **Update Cadence**: Monthly
      - **Key Elements**: Version release dates (Q1, Q2, etc.), feature lists per release, bug fixes
      - **Audience**: Sales, support, marketing, external customers
      - **Structure**:
        - v3.1 (April 15, 2026): [List of 8-10 features], [Critical bug fixes]
        - v3.2 (June 1, 2026): [List of features], [Performance improvements]
      - **Strengths**: Crystal clear dates for sales/marketing; external customers know what's coming
      - **Weaknesses**: Commits you to dates; less flexibility for reprioritization
      - **Use When**: Enterprise customers demand specific dates; sales cycles require visibility
      
      ### 8. Theme-Based Roadmap (Strategic Problem-Focused)
      **Best For**: Focusing on problems to solve rather than solutions to build
      - **Update Cadence**: Quarterly
      - **Key Elements**: Theme (problem area), strategic focus, vision, cross-team ownership
      - **Audience**: Product leaders, cross-functional teams, executives
      - **Structure**:
        - Theme: "Enterprise Onboarding" → Problems: slow setup, limited customization, no audit trail
        - Solution candidates: SSO, role-based access, audit logs, data migration tools
      - **Strengths**: Encourages innovation (not locked into specific features); problem-first thinking
      - **Weaknesses**: Can feel unfocused; solutions might take longer to emerge
      - **Use When**: You want to avoid "this is the solution" thinking; foster innovation
      
      ### 9. Evidence-Based Roadmap (Data-Driven)
      **Best For**: Prioritizing based on data: customer feedback, revenue impact, usage patterns
      - **Update Cadence**: Monthly
      - **Key Elements**: Customer feedback, cumulative MRR, feature requests/votes, revenue opportunities
      - **Audience**: Sales teams, PMs, revenue-focused stakeholders, investors
      - **Structure**:
        - Feature X: 47 customer requests, $2.3M revenue opportunity, 18% of churn driver factors
        - Feature Y: 8 customer requests, $400K opportunity, 3% of churn
        - Prioritize: Feature X (clearly higher impact)
      - **Strengths**: Data-driven decisions reduce bias; quantifies revenue impact; aligns sales & product
      - **Weaknesses**: Good data is hard to get; can miss strategic opportunities with low immediate ROI
      - **Use When**: You have good customer feedback data; sales and product are misaligned on priorities
      
      ### Roadmap Framework Comparison Matrix
      
      | Framework | Strategic Focus | Time Horizon | Audience | Update Speed | Commitment Level |
      |-----------|-----------------|--------------|----------|--------------|-----------------|
      | Agile | Execution | Sprint-based | Teams | Weekly | Flexible |
      | Now-Next-Later | Balanced | 0-12+ months | All | Monthly | Low on "Later" |
      | Goal-Oriented | Outcomes | Quarterly | Execs/Teams | Quarterly | Medium |
      | Feature-Based | Delivery | Months to quarters | Sales/Eng | Bi-weekly | High |
      | Portfolio | Multi-product | Quarters/years | C-Suite | Quarterly | Medium |
      | Technology | Infrastructure | Years | Tech leads | Semi-annual | High |
      | Release | Calendar | Months | Sales/Support | Monthly | Very High |
      | Theme-Based | Problems | Quarters | Leaders | Quarterly | Low (exploratory) |
      | Evidence-Based | Revenue | Months | Sales/Revenue | Monthly | Data-dependent |
    
    best_practices: |
      ## Roadmap Best Practices
      
      ### Choosing the Right Framework for Your Situation
      
      **Use Agile Roadmap When**:
      - Teams work in 2-week sprints
      - You need rapid reprioritization and feedback loops
      - Stakeholders are primarily internal development teams
      
      **Use Now-Next-Later When**:
      - Stakeholders demand dates but you have high uncertainty
      - You want to reduce commitment anxiety
      - You need to balance focus (Now) with direction (Later)
      
      **Use Goal-Oriented When**:
      - Leadership emphasizes "outcomes not outputs"
      - Team struggles to answer "why are we building this?"
      - You want explicit connection to OKRs
      
      **Use Feature-Based When**:
      - Sales needs to manage customer expectations
      - Customer contracts reference specific features/dates
      - You have visibility into what's coming and can commit
      
      **Use Portfolio When**:
      - You manage 3+ products
      - Products share infrastructure or resources
      - You need to optimize cross-product priorities
      
      **Use Technology Roadmap When**:
      - You have significant technical debt to address
      - Core infrastructure needs major upgrades
      - Architecture decisions impact product for years
      
      **Use Release Roadmap When**:
      - Enterprise customers demand specific version dates
      - Sales cycles require 6-month visibility
      - You can reliably commit to release schedules
      
      **Use Theme-Based When**:
      - You want teams to focus on problems, not predefined solutions
      - Innovation is a key strategic goal
      - Teams suggest multiple solution approaches to same problem
      
      **Use Evidence-Based When**:
      - You have strong customer feedback data
      - Sales and product teams disagree on priorities
      - Revenue impact is clearly quantifiable
      
      ### Mixing Frameworks (Recommended Approach)
      
      Most organizations use **multiple frameworks simultaneously**:
      
      1. **Master Roadmap** (Theme or Goal-Oriented)
         - Single source of truth
         - Drives all other roadmaps
         - Updated quarterly
      
      2. **Executive View** (Portfolio or Goal-Oriented)
         - For C-Suite visibility
         - Financial and strategic metrics
         - Quarterly updates
      
      3. **Team View** (Agile + Now-Next-Later)
         - For engineering teams
         - Sprint-level detail
         - Weekly updates
      
      4. **Customer/Sales View** (Feature-Based or Release)
         - For customers and sales
         - Specific features and dates
         - Monthly updates
      
      5. **Partner View** (Theme or Evidence-Based)
         - For external partners
         - Integration opportunities + revenue opportunities
         - Quarterly updates
      
      ### Best Practices for Effectiveness
      
      #### 1. Crafting Compelling Narratives
      - **Story-First**: Lead with "why" before "what"
        - ❌ "Build real-time collaborative editing"
        - ✅ "Teams lose 2 hours/week coordinating docs—RT collab fixes it"
      
      - **Theme Around Value**: Organize by business outcome, not features
        - ❌ "Q2: API v2, DB migration, mobile app"
        - ✅ "Q2: Enterprise Adoption (API v2), Ops Efficiency (DB), UX (mobile)"
      
      - **Be Transparent About Certainty**: Use confidence bands
        - Committed (80%+): Feature/project you'll deliver
        - Likely (60-80%): Probable but subject to learning
        - Exploring (20-60%): You're investigating; outcome uncertain
      
      #### 2. Managing Multiple Roadmaps
      - **Single Master** (source of truth)
      - **Multiple Tailored Views** (generated from master)
      - **Consistent Language** (same initiatives across all views)
      - **Update Synchronization** (all views update on same schedule)
      
      #### 3. Stakeholder Alignment
      - **Pre-Socialize**: Share key decisions with stakeholders before public announcement
      - **Show Trade-Offs**: "We're doing X (Q2) which means deferring Y (to Q3)"
      - **Explain Sequencing**: "Foundation Z (Q2) enables Feature Y (Q3) enables Capability X (Q4)"
      - **Document Buy-In**: Get signed commitments, list risks, define decision gates
      
      #### 4. Cadence Alignment
      | Timeframe | Cadence | Forum | Participants |
      |-----------|---------|-------|----------------|
      | Weekly | Sprint standup | Team sync | Dev team + PM |
      | Bi-weekly | Delivery review | Demo/retro | Delivery team + stakeholders |
      | Monthly | Roadmap update | Status call | All stakeholders |
      | Quarterly | Strategic review | Board/exec meeting | Leadership + heads of function |
      | Annual | Strategy/vision | Offsite/planning | C-Suite + division heads |
      
      #### 5. Evidence & Data Integration
      - **Customer Feedback**: Track in one place (Savio, Aha, feature voting tool)
      - **Usage Metrics**: Monitor what customers actually use vs. what they're asking for
      - **Revenue Impact**: Quantify opportunity size for each initiative
      - **Churn Analysis**: Connect features to churn reduction
      
      #### 6. Handling Uncertainty
      - **Separated Timelines**: Now (certain) → Next (likely) → Later (exploring)
      - **Confidence Indicators**: Mark each item with confidence level
      - **Learning Gates**: Define what you need to learn before committing
      - **Quarterly Reviews**: Revisit Later items; move to Next if conditions change
      
      ### Anti-Patterns to Avoid
      
      ❌ **Single-View Roadmap**: Using only one framework for all audiences
      → Solution: Tailor views to stakeholder needs
      
      ❌ **Date-Driven Planning**: Starting with "when" instead of "what & why"
      → Solution: Start with goals and themes; add dates only when feasible
      
      ❌ **Feature Overload**: 50+ items on roadmap
      → Solution: Ruthlessly prioritize; "300 ideas on roadmap is same as 0 ideas"
      
      ❌ **No Feedback Loop**: Roadmap is static artifact
      → Solution: Update monthly minimum; gather feedback at delivery reviews
      
      ❌ **Disconnect from Execution**: Roadmap doesn't ladder to sprints
      → Solution: Break quarterly goals into monthly + weekly milestones
      
      ❌ **Ignoring Dependencies**: Planning in isolation
      → Solution: Map infrastructure, API, data dependencies explicitly
    
    framework_stakeholder_mapping: |
      ## Framework Selection by Stakeholder Type
      
      ### For C-Suite Executives
      **Primary Frameworks**: Portfolio, Goal-Oriented, Theme-Based
      - **Portfolio Roadmap**: Multi-product view with resource allocation
      - **Goal-Oriented Roadmap**: Outcomes tied to company OKRs and metrics
      - **Theme-Based Roadmap**: Strategic focus areas; less about tactics
      - **Format**: 1-page summary or single slide
      - **Update Cadence**: Quarterly
      - **Key Questions Answered**: "What themes drive our strategy?" "How do we allocate resources?" "What's the financial impact?"
      
      ### For BU CEOs (Cross-Org Leaders)
      **Primary Frameworks**: Portfolio, Feature-Based (Resource View), Technology Roadmap
      - **Portfolio Roadmap**: See interdependencies across divisions
      - **Feature-Based**: Understand what product teams are committing to
      - **Technology Roadmap**: Identify shared infrastructure needs and joint dependencies
      - **Format**: Dependency matrix, resource timeline, impact assessment
      - **Update Cadence**: Monthly (steering) + quarterly (strategic)
      - **Key Questions Answered**: "What do you need from us?" "What shared infrastructure..." "What dependencies should we manage?"
      
      ### For Internal Teams (Engineers/PMs)
      **Primary Frameworks**: Agile, Now-Next-Later, Goal-Oriented, Theme-Based
      - **Agile Roadmap**: Sprint-level detail with feedback loops
      - **Now-Next-Later**: Gives direction while allowing sprint flexibility
      - **Goal-Oriented**: Connects sprint work to quarterly outcomes
      - **Theme-Based**: Provides problem context; enables creative solutions
      - **Format**: Gantt chart, sprint boards, epic map with dependencies
      - **Update Cadence**: Weekly (sprint) + monthly (roadmap)
      - **Key Questions Answered**: "What's in scope this sprint?" "Why are we building this?" "What are the dependencies?"
      
      ### For External Partners
      **Primary Frameworks**: Theme-Based, Evidence-Based, Release Roadmap
      - **Theme-Based**: Shows areas where partnerships add value
      - **Evidence-Based**: Quantifies opportunity size (revenue, customers, use cases)
      - **Release Roadmap**: Specifies when APIs/capabilities partners depend on will be available
      - **Format**: Capability timeline, integration opportunities, partnership value story
      - **Update Cadence**: Quarterly + ad-hoc for major opportunities
      - **Key Questions Answered**: "Where can we integrate?" "What's the timeline?" "How do we grow together?"
      
      ### Framework + Stakeholder Quick Reference
      
      | Framework | C-Suite | BU CEO | Internal Teams | Partners | Primary Value |
      |-----------|---------|--------|----------------|----------|----------------|
      | Agile | ✗ | ✗ | ✓✓ | ✗ | Execution clarity |
      | Now-Next-Later | ✓ | ✓ | ✓✓ | ✓ | Attention focus |
      | Goal-Oriented | ✓✓ | ✓ | ✓ | ✗ | Outcomes alignment |
      | Feature-Based | ✗ | ✓ | ✓ | ✓ | Deliverable clarity |
      | Portfolio | ✓✓ | ✓✓ | ✗ | ✗ | Strategic allocation |
      | Technology | ✗ | ✓ | ✓✓ | ✗ | Tech clarity |
      | Release | ✗ | ✓ | ✓ | ✓ | Commitment visibility |
      | Theme-Based | ✓ | ✓ | ✓✓ | ✓ | Problem focus |
      | Evidence-Based | ✓ | ✓ | ✓ | ✓ | Data-driven decisions |
      
      *Legend: ✓✓ = Primary framework, ✓ = Secondary/supporting, ✗ = Not typical*
